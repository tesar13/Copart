name: Otomoto Scraper

on:
  schedule:
    - cron: '0 8-22 * * *'      # co godzinę od 8:00 do 22:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies + Google Chrome
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip curl xvfb libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdbus-1-3 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2
          
          # Instalujemy najnowszy stabilny Google Chrome
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium beautifulsoup4 requests undetected-chromedriver

      - name: Run scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Uruchamiamy z xvfb (wirtualny ekran) – bardzo pomaga przy headless
          xvfb-run -a python otomoto.py

      - name: Commit updated IDs (jeśli są zmiany)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet otomoto.txt; then
            echo "No changes to commit"
          else
            git add otomoto.txt
            git commit -m "Update scraped IDs [skip ci]"
            git push
          fi
