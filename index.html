<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  display: flex;
  justify-content: center;
  padding: 16px;
  margin: 0;
}

.card {
  background: white;
  padding: 22px;
  border-radius: 16px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}

.title-gradient {
  text-align: center;
  font-size: 24px;
  font-weight: 700;
  background: linear-gradient(135deg, #6366f1, #4f46e5);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.title {
  text-align: center;
  margin-bottom: 20px;
}

.title h1 {
  font-size: 22px;
  font-weight: 700;
  margin: 0;
  color: #111;
}

.title p {
  font-size: 13px;
  color: #6b7280;
  margin-top: 4px;
}

h2 {
  text-align: center;
}

label {
  font-size: 14px;
}

input, select {
  width: 100%;
  padding: 14px;
  margin: 6px 0 14px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 16px;
  box-sizing: border-box;
}

input.error {
  border: 2px solid red;
}

button {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  background: #4f46e5;
  color: white;
  font-size: 16px;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🔥 klik efekt */
button:active {
  transform: scale(0.97);
}

/* 🔥 spinner */
.loader {
  display: none;
  width: 18px;
  height: 18px;
  border: 3px solid rgba(255,255,255,0.4);
  border-top: 3px solid white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* 🔥 tryb loading */
button.loading #btnText {
  display: none;
}

button.loading .loader {
  display: block;
}

button:disabled {
  opacity: 0.7;
}

.result-box {
  margin-top: 16px;
  padding: 16px;
  border-radius: 12px;
  border: 1px solid #ddd;
  text-align: center;
  font-size: 20px;
  opacity: 0;
  transition: 0.3s;
}

.result-box.show {
  opacity: 1;
}

.note {
  display: none;
  text-align: center;
  font-size: 12px;
  margin-top: 12px;
}
</style>
</head>

<body>
<div class="card">

<h1 class="title-gradient">Kalkulator kosztów</h1>

<label>Cena pojazdu na aukcji (w Euro)</label>
<input id="price" type="number" placeholder="np. 5000">

<label>Czy to hybryda?</label>
<select id="hybrid">
  <option value="Nie" selected>Nie</option>
  <option value="PHEV">Hybryda Plug-in (PHEV)</option>
  <option value="HEV">Klasyczna hybryda (HEV lub MHEV)</option>
</select>

<label>Pojemność silnika:</label>
<select id="engine">
  <option value="small" selected>2000 cm³ lub mniejszy</option>
  <option value="medium">2001 - 3500 cm³</option>
  <option value="large">ponad 3500 cm³</option>
</select>

<label>VAT do zapłaty?</label>
<select id="vat">
  <option value="Tak">Tak</option>
  <option value="Nie" selected>Nie</option>
</select>

<!-- PRZYCISK Oblicz -->
<button id="calcBtn" onclick="calc()">
  <span id="btnText">Oblicz</span>
  <span class="loader"></span>
</button>

<div class="result-box" id="result"></div>
<div class="note" id="note">
*kwota zawiera już akcyzę, opłatę dla Copart i 2000zł za transport do Polski
</div>

</div>

<script>
function calc() {
  const priceInput = document.getElementById('price');
  const price = priceInput.value;

  const hybrid = document.getElementById('hybrid').value;
  const engine = document.getElementById('engine').value;
  const vat = document.getElementById('vat').value;

  const resultBox = document.getElementById('result');
  const btn = document.getElementById('calcBtn');

  // 🔥 WALIDACJA
  if (!price) {
    priceInput.classList.add("error");

    priceInput.scrollIntoView({
      behavior: "smooth",
      block: "center"
    });

    return;
  }

  priceInput.classList.remove("error");

  // 🔥 START LOADING
  btn.classList.add("loading");
  btn.disabled = true;

  resultBox.classList.remove("show");
  resultBox.innerText = "";

  fetch("https://script.google.com/macros/s/AKfycbxJKS0gKEI_Yn4ACtBUZU_OCTs2seJWVfgt8eUesCIavysAMGN9uZDDfi1WgnIngzM/exec", {
    method: "POST",
    body: JSON.stringify({
      price: Number(price),
      hybrid: hybrid,
      engine: engine,
      vat: vat
    })
  })
  .then(res => res.json())
  .then(data => {
    resultBox.innerText = data.result;
    resultBox.classList.add("show");
  
    document.getElementById('note').style.display = "block";
  
    btn.classList.remove("loading");
    btn.disabled = false;
  })
  .catch(() => {
    btn.classList.remove("loading");
    btn.disabled = false;
  });

// 🔥 usuwa czerwone pole przy wpisywaniu
document.getElementById('price').addEventListener('input', function() {
  this.classList.remove("error");
});
</script>

</body>
</html>
